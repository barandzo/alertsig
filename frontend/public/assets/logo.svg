<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 90" width="480" height="90">
  <defs>
    <linearGradient id="sirenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3b3b"/>
      <stop offset="100%" style="stop-color:#cc0000"/>
    </linearGradient>
  </defs>

  <!-- "Al" en blanc -->
  <text x="0" y="74" font-family="'Arial Black', Arial, sans-serif" font-size="74" font-weight="900" fill="#ffffff">Al</text>

  <!-- Sirène (remplace le O de Alo) -->
  <g transform="translate(100, 4)">
    <rect x="8" y="38" width="42" height="26" rx="5" fill="url(#sirenGrad)"/>
    <path d="M10,38 Q29,8 48,38 Z" fill="url(#sirenGrad)"/>
    <circle cx="29" cy="28" r="7" fill="#ff8800" opacity="0.9"/>
    <circle cx="29" cy="28" r="4" fill="white" opacity="0.95"/>
    <line x1="29" y1="4"  x2="29" y2="12" stroke="#ff3b3b" stroke-width="3" stroke-linecap="round"/>
    <line x1="8"  y1="12" x2="14" y2="18" stroke="#ff3b3b" stroke-width="3" stroke-linecap="round"/>
    <line x1="50" y1="12" x2="44" y2="18" stroke="#ff3b3b" stroke-width="3" stroke-linecap="round"/>
    <line x1="2"  y1="28" x2="10" y2="28" stroke="#ff3b3b" stroke-width="3" stroke-linecap="round"/>
    <line x1="56" y1="28" x2="48" y2="28" stroke="#ff3b3b" stroke-width="3" stroke-linecap="round"/>
    <rect x="4" y="64" width="50" height="8" rx="3" fill="#ffffff"/>
  </g>

  <!-- "Alerte" en blanc -->
  <text x="168" y="74" font-family="'Arial Black', Arial, sans-serif" font-size="74" font-weight="900" fill="#ffffff">Alerte</text>
</svg>
